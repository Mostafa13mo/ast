name: ci

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.docker_user }}
          password: ${{ secrets.docker_pass }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: docker.io/mostafa137/app:latest    
